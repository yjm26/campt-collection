<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campt's Collection Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            poke: { red: '#CC0000', darkred: '#9E0000', black: '#1a1a1a', gray: '#f5f5f5', line: '#e0e0e0' }
          }
        }
      }
    }
  </script>
  <style>
    .pokeball-icon-lg {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(to bottom, #CC0000 50%, #fff 50%);
      border: 3px solid #1a1a1a; position: relative;
    }
    .pokeball-icon-lg::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 3px; background: #1a1a1a; transform: translateY(-50%);
    }
    .pokeball-icon-lg::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 3px solid #1a1a1a;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body class="font-sans bg-poke-gray min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="pokeball-icon-lg mx-auto mb-4"></div>
      <h1 class="text-2xl font-bold text-poke-black">CAMPT'S COLLECTION</h1>
      <p class="text-sm text-gray-500 mt-1">Admin Panel Login</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white rounded-xl shadow-sm border border-poke-line p-6">
      <form id="login-form">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" required placeholder="Enter username"
                 class="w-full px-3 py-2.5 border border-poke-line rounded-lg focus:border-poke-red focus:outline-none focus:ring-2 focus:ring-poke-red/20 transition text-sm">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" required placeholder="Enter password"
                 class="w-full px-3 py-2.5 border border-poke-line rounded-lg focus:border-poke-red focus:outline-none focus:ring-2 focus:ring-poke-red/20 transition text-sm">
        </div>
        <button type="submit" id="login-btn"
                class="w-full py-2.5 bg-poke-red text-white font-semibold rounded-lg hover:bg-poke-darkred transition text-sm">
          Sign In
        </button>
        <p id="error-msg" class="hidden text-sm text-red-500 text-center mt-3"></p>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="/" class="hover:text-poke-red transition">← Back to Store</a>
    </p>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Redirect if already logged in
    const token = localStorage.getItem('campt_token');
    if (token) {
      fetch(`${API_BASE}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => { if (data.username) window.location.href = '/admin.html'; })
        .catch(() => localStorage.removeItem('campt_token'));
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          return;
        }

        localStorage.setItem('campt_token', data.token);
        localStorage.setItem('campt_user', JSON.stringify(data.user));
        window.location.href = '/admin.html';
      } catch (err) {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
