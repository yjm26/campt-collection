<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campt's Collection</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: { poke: { red: '#CC0000', darkred: '#9E0000', black: '#111111' } }
        }
      }
    }
  </script>
  <style>
    .form-input:focus { border-color: #18181b; outline: none; }
    .brand-left { background: #f4f4f5; }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="flex min-h-screen">
    <!-- Left: Branding -->
    <div class="hidden lg:flex lg:w-1/2 brand-left items-center justify-center p-12">
      <div class="text-center max-w-sm">
        <img src="/logo.jpg" alt="Campt's Collection" class="h-24 w-auto mx-auto mb-6 rounded-lg">
        <h1 class="text-3xl font-bold text-zinc-900 tracking-tight mb-2">Campt's Collection</h1>
        <p class="text-zinc-400 text-sm leading-relaxed">Curated Pokémon TCG cards, sourced from Japan.</p>
      </div>
    </div>

    <!-- Right: Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-sm">
        <!-- Mobile logo (hidden on desktop) -->
        <div class="lg:hidden text-center mb-8">
          <img src="/logo.jpg" alt="Logo" class="h-12 w-auto mx-auto mb-4 rounded-lg">
          <h1 class="text-xl font-bold text-zinc-900 tracking-tight">Campt's Collection</h1>
          <p class="text-xs text-zinc-400 mt-1">Admin Panel</p>
        </div>

        <!-- Desktop heading -->
        <div class="hidden lg:block mb-8">
          <h2 class="text-2xl font-bold text-zinc-900 tracking-tight">Sign in</h2>
          <p class="text-sm text-zinc-400 mt-1">Enter your admin credentials to continue.</p>
        </div>

        <!-- Form -->
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-zinc-500 mb-1.5">Username</label>
            <input type="text" id="username" required placeholder="Enter username"
                   class="form-input w-full px-3 py-2.5 border border-zinc-200 rounded-lg text-sm bg-white transition-colors">
          </div>
          <div>
            <label class="block text-xs font-medium text-zinc-500 mb-1.5">Password</label>
            <input type="password" id="password" required placeholder="Enter password"
                   class="form-input w-full px-3 py-2.5 border border-zinc-200 rounded-lg text-sm bg-white transition-colors">
          </div>
          <button type="submit" id="login-btn"
                  class="w-full py-2.5 bg-zinc-900 text-white font-medium rounded-lg hover:bg-zinc-800 transition-colors text-sm">
            Sign In
          </button>
          <p id="error-msg" class="hidden text-sm text-red-500 text-center"></p>
        </form>

        <p class="text-center text-xs text-zinc-400 mt-8">
          <a href="/" class="hover:text-zinc-900 transition-colors">← Back to Store</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Redirect if already logged in
    const token = localStorage.getItem('campt_token');
    if (token) {
      fetch(`${API_BASE}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => { if (data.username) window.location.href = '/admin.html'; })
        .catch(() => localStorage.removeItem('campt_token'));
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          return;
        }

        localStorage.setItem('campt_token', data.token);
        localStorage.setItem('campt_user', JSON.stringify(data.user));
        window.location.href = '/admin.html';
      } catch (err) {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
