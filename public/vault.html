<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault - Campt's Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            poke: { red: '#CC0000', darkred: '#9E0000', black: '#1a1a1a', gray: '#f5f5f5' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
    
    /* Grading slab / sleeve effect */
    .card-slab {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }
    .card-slab:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      border-color: #d0d0d0;
    }
    
    /* Inner card image area */
    .card-slab-image {
      background: #f0f0f0;
      position: relative;
      overflow: hidden;
    }
    
    /* Grading label badge */
    .grading-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);
      border: 1px solid #e5e5e5;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 10;
    }
    
    /* Sold overlay */
    .sold-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sold-overlay span {
      background: #fff;
      color: #111;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }
    
    /* Card info area */
    .card-slab-info {
      padding: 8px 10px;
      border-top: 1px solid #f0f0f0;
    }
    
    .filter-active { background-color: #CC0000 !important; color: white !important; }
    .card-enter { animation: fadeUp 0.4s ease-out both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-[#1a1a1a]">

  <!-- Navbar -->
  <nav class="bg-white border-b border-[#e8e8e8] sticky top-0 z-50">
    <div class="max-w-[1400px] mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 hover:opacity-80 transition">
        <img src="/logo.jpg" alt="Logo" class="h-7 w-auto">
        <span class="font-bold text-sm">Campt's Collection</span>
      </a>
      <div class="flex items-center gap-6">
        <a href="/" class="text-xs text-gray-500 hover:text-poke-red transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Store
        </a>
        <a href="/vault.html" class="text-xs font-semibold text-poke-red">Vault</a>
      </div>
    </div>
  </nav>

  <!-- Vault Section -->
  <section class="max-w-[1400px] mx-auto px-6 py-12">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-2xl font-extrabold tracking-tight">The Vault</h2>
        <p class="text-gray-400 text-[10px] font-semibold tracking-[0.2em] uppercase mt-1">Full Collection</p>
      </div>
      <div class="flex items-center gap-3">
        <input type="text" id="search-input" placeholder="Search cards..."
               class="w-full md:w-64 px-3 py-2 border border-[#e0e0e0] rounded-md focus:border-poke-red focus:outline-none text-xs bg-white">
      </div>
    </div>

    <!-- Filters -->
    <div id="filters" class="flex gap-2 overflow-x-auto pb-4 mb-6">
      <button data-category="" class="filter-btn filter-active px-3 py-1.5 text-[11px] font-semibold rounded-full whitespace-nowrap">All</button>
    </div>

    <!-- Cards Grid - dense layout -->
    <div id="cards-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-3">
      <!-- Cards loaded dynamically -->
    </div>

    <div id="loading" class="text-center py-16 text-gray-400">
      <p class="text-sm">Loading vault...</p>
    </div>

    <div id="empty-vault" class="hidden text-center py-16 text-gray-400">
      <p class="text-base mb-2">No cards found</p>
      <p class="text-xs">Check back later for new arrivals</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t border-[#e8e8e8] mt-12">
    <div class="max-w-[1400px] mx-auto px-6 py-6 flex items-center justify-between">
      <p class="text-[10px] text-gray-400">&copy; 2026 Campt's Collection</p>
      <div class="flex items-center gap-4 text-[10px] text-gray-400">
        <a href="/" class="hover:text-poke-red transition">Store</a>
        <span>·</span>
        <a href="/vault.html" class="text-poke-red font-semibold">Vault</a>
      </div>
    </div>
  </footer>

  <script>
    const API_BASE = window.location.origin;
    let allCards = [];
    let currentCategory = '';

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    function getCardPlaceholder() {
      return `<svg class="w-10 h-10 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <rect x="4" y="4" width="16" height="16" rx="2" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="1" fill="currentColor"/>
        <path d="M20 20L14 14" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`;
    }

    async function loadCategories() {
      try {
        const res = await fetch(`${API_BASE}/api/categories`);
        const categories = await res.json();
        const filtersDiv = document.getElementById('filters');
        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.dataset.category = cat.name;
          btn.className = 'filter-btn px-3 py-1.5 text-[11px] text-gray-500 font-semibold rounded-full whitespace-nowrap hover:text-gray-900 transition';
          btn.textContent = cat.name;
          filtersDiv.appendChild(btn);
        });
      } catch (err) { console.error('Categories error:', err); }
    }

    async function loadCards() {
      try {
        const res = await fetch(`${API_BASE}/api/cards`);
        allCards = await res.json();
        renderCards(allCards);
      } catch (err) {
        console.error('Cards error:', err);
        document.getElementById('loading').textContent = 'Failed to load cards.';
      }
    }

    function renderCards(cards) {
      const grid = document.getElementById('cards-grid');
      const loading = document.getElementById('loading');
      const empty = document.getElementById('empty-vault');

      loading.classList.add('hidden');

      // Filter out sold items from default view
      let filtered = cards.filter(c => c.status === 'active');
      if (currentCategory) filtered = filtered.filter(c => c.category === currentCategory);

      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(c =>
          c.name.toLowerCase().includes(searchTerm) ||
          c.category.toLowerCase().includes(searchTerm) ||
          (c.set_name && c.set_name.toLowerCase().includes(searchTerm))
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');

      grid.innerHTML = filtered.map((card, i) => `
        <div class="card-slab card-enter" style="animation-delay: ${i * 20}ms">
          <div class="card-slab-image aspect-[3/4]">
            ${card.image_url
              ? `<img src="${esc(card.image_url)}" alt="${esc(card.name)}" class="w-full h-full object-cover">`
              : `<div class="w-full h-full flex items-center justify-center">${getCardPlaceholder()}</div>`
            }
            ${card.grading ? `<div class="grading-badge">${esc(card.grading)}</div>` : ''}
            ${card.status === 'sold' ? `<div class="sold-overlay"><span>Sold</span></div>` : ''}
          </div>
          <div class="card-slab-info">
            <p class="text-[10px] font-semibold text-gray-500 truncate mb-0.5">${esc(card.category)}</p>
            <h3 class="text-[11px] font-bold text-gray-900 leading-tight truncate">${esc(card.name)}</h3>
            <p class="text-[12px] font-extrabold text-gray-900 mt-1">${esc(card.price)}</p>
          </div>
          ${card.status !== 'sold' ? `<button data-card-id="${card.id}" class="view-details-btn absolute inset-0 bg-black/0 hover:bg-black/[0.02] transition cursor-pointer" aria-label="View ${esc(card.name)}"></button>` : ''}
        </div>
      `).join('');
    }

    // Filter buttons
    document.getElementById('filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      currentCategory = btn.dataset.category;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
      btn.classList.add('filter-active');
      renderCards(allCards);
    });

    // View Details
    document.getElementById('cards-grid').addEventListener('click', (e) => {
      const btn = e.target.closest('.view-details-btn');
      if (!btn) return;
      const cardId = parseInt(btn.dataset.cardId);
      const card = allCards.find(c => c.id === cardId);
      if (card) {
        window.location.href = `/?card=${cardId}`;
      }
    });

    // Search
    document.getElementById('search-input').addEventListener('input', () => renderCards(allCards));

    // Init
    loadCategories();
    loadCards();
  </script>
</body>
</html>
